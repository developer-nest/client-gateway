
syntax = "proto3";

package driver;

service DriverService {
  rpc Create (CreateDriverDto) returns (Driver) {}
  rpc FindAll (PaginationDTO) returns (DriverList) {}
  rpc FindOne (DriverById) returns (Driver) {}
  rpc Update (UpdateDriverDto) returns (Driver) {}
  rpc Remove (DriverById) returns (Driver) {}
}

message DriverById {
  string id = 1;
}

enum StatusDriver {
  DISPONIBLE = 0; // El valor 0 debe ser el predeterminado
  VACACIONES = 1;
  FRANCO = 2;
  CIUDAD = 3;
  INTERIOR = 4;
  OTRO = 5;
}

message Driver {
  string id = 1;
  string fullName = 2;
  string address = 3;
  string idCard = 4;
  string dateIn = 5;
  string dateEnd = 6;
  bool isActive = 7;
  StatusDriver status = 8; // Usamos el enum definido arriba
}

message CreateDriverDto {  
  string fullName = 1;
  string address = 2;
  string idCard = 3;
  bool isActive = 4;
  StatusDriver status = 5;
  string dateIn = 6;
  string dateEnd = 7;
}

message PaginationDTO {  
  int32 limit = 1;
  int32 page = 2;  
}

message UpdateDriverDto {  
  string id = 1;
  string fullName = 2;
  string address = 3;
  string idCard = 4;
  string dateIn = 5;
  string dateEnd = 6;
  bool isActive = 7;
  StatusDriver status = 8; // Usamos el enum definido arriba
}

message DriverList {
  repeated Driver items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
  int32 totalPages = 5;
}
